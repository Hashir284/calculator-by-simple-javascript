<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Calculator</title>
  </head>
  <style>
    body{
     background: #2A7B9B;
background: linear-gradient(90deg, rgba(42, 123, 155, 1) 0%, rgba(43, 177, 204, 1) 100%, rgba(87, 199, 133, 1) 100%, rgba(208, 217, 93, 1) 100%, rgba(16, 162, 224, 1) 84%);
    }
    button {
      background: #d1eafb;
      font-size: 20px;
      border: 1px solid #ABABAB;
            border-bottom-color: #ABABAB;
            border-right-color: #ABABAB;
            border-top-color: #fff;
            border-left-color: #fff;
      padding: 25px 0px;
      display: inline-block;
    }
    .c1{
      background-color: #87CEEB;
      font-weight: 600;
    }
    .operators{
      background-color: #808080;
      font-weight: 500;
      font-size: 30px;
      padding: 20px 0;
    }
    #container{
      margin: 20px;
      box-shadow: rgba(0, 0, 0, 0.16) 0px 1px 4px;
      overflow: hidden;
      border-radius: 10px;
      background: #ababab;
    }
    #screen{
      background-color: #2BB1CC;
    }
    #press{
      border-radius: 4px;
      width: 225px;
      padding: 10px;
      background-color: #fff;
    }
  </style>
  <body class="box-border flex justify-center items-center h-screen w-full">
    <div class="max-w-s w-sm" id="container">
      <div
        class="w-full text-right p-4" id="screen"
      >
        <div class="text-2xl h-6" id="second"></div>
        <div class="text-4xl h-10" id="first">0</div>
      </div>
      <div id="tabs w-full">
        <div class="flex w-full">
          <button class="grow c1">AC</button>
          <button class="grow c1">Del</button>
          <button class="grow operators">/</button>
        </div>
        <div class="flex w-full">
          <button class="basis-30">7</button>
          <button class="basis-30">8</button>
          <button class="basis-30">9</button>
          <button class="basis-30 operators">*</button>
        </div>
        <div class="flex w-full">
          <button class="basis-30">4</button>
          <button class="basis-30">5</button>
          <button class="basis-30">6</button>
          <button class="basis-30 operators">-</button>
        </div>
        <div class="flex w-full">
          <button class="basis-30">1</button>
          <button class="basis-30">2</button>
          <button class="basis-30">3</button>
          <button class="basis-30 operators">+</button>
        </div>
        <div class="flex w-full">
          <button class="grow basis-30 c1">.</button>
          <button class="grow-2 basis-60">0</button>
          <button class="grow basis-30 operators">=</button>
        </div>
      </div>
    </div>
  </body>

  <script src="script.js"></script>
</html>
